name: Tests

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate configuration and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate Renovate configuration
        run: npx --no-install renovate-config-validator default.json default-automerge.json renovate.json

      - uses: actions/setup-dotnet@v5

      - name: Run unit tests
        run: dotnet test tests --filter "Category!=Live"

  system-tests:
    name: Live Renovate system tests
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/setup-dotnet@v5

      - name: Run live system tests
        run: dotnet test tests --filter "Category=Live"
        env:
          RENOVATE_TEST_TOKEN: ${{ secrets.RENOVATE_TEST_TOKEN }}
