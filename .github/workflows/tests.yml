name: Tests

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate configuration and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate Renovate configuration
        run: npx --no-install renovate-config-validator default.json default-automerge.json renovate.json

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5

      - name: Run unit tests
        run: |
          mkdir -p artifacts
          dotnet test tests --filter "Category!=Live" /bl:artifacts/unit-tests.binlog

      - name: Upload unit test binlog
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-tests-binlog
          path: | 
            artifacts/unit-tests.binlog
            tests/**/*.g.cs
          if-no-files-found: ignore

  system-tests:
    name: Live Renovate system tests
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5

      - name: Run live system tests
        run: |
          mkdir -p artifacts
          dotnet test tests --filter "Category=Live" /bl:artifacts/system-tests.binlog
        env:
          RENOVATE_TEST_TOKEN: ${{ secrets.RENOVATE_TEST_TOKEN }}

      - name: Upload live system test binlog
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: system-tests-binlog
          path: artifacts/system-tests.binlog
          if-no-files-found: ignore
